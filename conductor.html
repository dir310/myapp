<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Conductor</title>
    <link rel="stylesheet" href="/src/styles/common.css">
    <link rel="stylesheet" href="/src/styles/conductor.css">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6B00">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Conductor">
</head>
<body>

<div class="header">
    <div class="title">Panel Conductor</div>
</div>

<div class="status-container">
    <button id="radarBtn" class="radar-toggle radar-off">
        <div class="status-dot"></div>
        <span id="radarText">ACTIVAR RADAR (SONIDO)</span>
    </button>
</div>

<div id="newRideBanner" class="new-ride-banner">¡NUEVO VIAJE DISPONIBLE! 🚕</div>

<label style="font-size:11px; color:rgba(255,255,255,.4); margin-bottom:6px; display:block; text-transform:uppercase; letter-spacing: 1px;">Tu Identificación (Placa / Nombre)</label>
<input type="text" id="conductorName" class="driver-name" placeholder="Coloca tu nombre y placa" value="">

<div style="font-size:14px; font-weight:bold; margin-bottom:12px; color:rgba(255,255,255,.8); display: flex; align-items:center; gap:8px;">
    <span>📡</span> Viajes en curso
</div>
<div id="viajesList">
    <div class="empty-state">
        <div style="font-size: 45px; margin-bottom: 15px; opacity:.3;">📡</div>
        Cargando radar...
    </div>
</div>

<script type="module" src="/src/conductor/main.js"></script>
</body>
</html>
