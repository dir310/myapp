<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>MovilCal | Viajes rápidos y seguros</title>
    <meta name="description" content="Planifica tu ruta con MovilCal en La Calera, Cundinamarca. Mapa satelital interactivo con navegación por Waze.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles/common.css">
    <link rel="stylesheet" href="/src/styles/user.css">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6B00">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MovilCal">
</head>
<body>

<!-- ── Map ── -->
<div id="map"></div>

<!-- ── Top Bar ── -->
<div class="topbar">
    <div class="topbar-brand" id="openSidebarLink">
        <div class="brand-dot">🗺️</div>
        <div>
            <div class="brand-name">Movil<span>Cal</span></div>
            <div class="brand-sub">La Calera, Cundinamarca</div>
        </div>
    </div>
</div>

<!-- ── Route Info Pill ── -->
<div class="route-pill" id="routePill">
    <div class="pill-stat">
        <span>📏</span><span class="pill-val" id="routeDistance">-</span><span class="pill-lbl">km</span>
    </div>
    <div class="pill-sep"></div>
    <div class="pill-stat">
        <span>⏱️</span><span class="pill-val" id="routeTime">-</span><span class="pill-lbl">min</span>
    </div>
</div>

<!-- ── Sidebar ── -->
<div class="sidebar" id="sidebar">
    <div class="sheet-header" id="sidebarHeader" title="Cerrar / Abrir">
        <span class="sheet-handle"></span>
        <div class="sheet-title-mini">Menú Principal</div>
    </div>
    
    <div class="sheet-content">
        <!-- Passenger Profile Header -->
        <div id="passengerProfileDisplay" style="display:none; background:rgba(255,255,255,.05); border-radius:8px; padding:10px 15px; margin-bottom:15px; align-items:center; justify-content:space-between; cursor:pointer;" title="Haz clic para editar">
            <div style="display:flex; align-items:center; gap:10px;">
                <div style="font-size:24px;">👤</div>
                <div>
                    <div id="displayClientName" style="color:#fff; font-weight:bold; font-size:14px; text-transform:capitalize;">-</div>
                    <div id="displayClientPhone" style="font-size:11px; color:rgba(255,255,255,.5);">-</div>
                </div>
            </div>
            <div style="display:flex; flex-direction:column; gap:5px;">
                <button id="editPassengerBtn" style="background:rgba(255,107,0,.15); border:1px solid rgba(255,107,0,.3); border-radius:8px; color:#FF6B00; font-size:10px; font-weight:600; cursor:pointer; padding:5px 10px;">✏️ Editar</button>
                <button id="logoutPassengerBtn" style="background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:8px; color:rgba(255,255,255,.7); font-size:10px; font-weight:600; cursor:pointer; padding:5px 10px;">Salir</button>
            </div>
        </div>

        <!-- Mode Toggle -->
        <div class="mode-toggle">
            <button class="mode-btn active" id="modeSearchBtn">🔍 Buscar lugar</button>
            <button class="mode-btn" id="modeClickBtn">📍 Tocar mapa</button>
            <button class="mode-btn reset-btn" id="resetPointsBtn" title="Reiniciar puntos">🔄 Reiniciar</button>
        </div>

        <!-- Route Inputs -->
        <div class="route-row">
            <div class="route-dots">
                <div class="dot-a"></div>
                <div class="dot-line"></div>
                <div class="dot-b"></div>
            </div>
            <div class="inputs-col">
                <div class="input-wrapper">
                    <input type="text" id="startInput" class="route-input" placeholder="¿Dónde estás?" autocomplete="off">
                    <button class="clear-btn">✕</button>
                    <div class="suggestions" id="startSuggestions"></div>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="endInput" class="route-input" placeholder="¿A dónde vas?" autocomplete="off">
                    <button class="clear-btn">✕</button>
                    <div class="suggestions" id="endSuggestions"></div>
                </div>
            </div>
        </div>

        <p class="click-hint" id="clickHint">Toca el mapa para colocar inicio y destino</p>

        <!-- Initial Actions -->
        <div id="mainActions" class="actions">
            <button class="btn" style="background:rgba(255,255,255,.05); color:rgba(255,255,255,.3); width:100%" disabled>📍 Selecciona los puntos del viaje</button>
        </div>

        <!-- Price Section (hidden initially) -->
        <div id="priceSection" style="display:none;">
            <div class="price-box">
                <div class="price-title">Tarifa Estimada (Moto)</div>
                <div class="price-value" id="priceValue">$0</div>
            </div>
            <div class="actions">
                <button class="btn" style="background:rgba(255,255,255,.08); color:rgba(255,255,255,.8); flex:0.4;" id="cancelRideBtn">Cancelar</button>
                <button class="btn btn-primary" id="acceptRideBtn">🏍️ Pedir Viaje</button>
            </div>
        </div>

        <div class="status-bar" id="statusBar"></div>
    </div>
</div>

<!-- Overlay de Calificación -->
<div id="ratingOverlay" class="rating-overlay">
    <div class="rating-card">
        <div style="font-size: 50px; margin-bottom: 15px;">🏁</div>
        <h2 style="color: #FF6B00; font-weight: 800; margin-bottom: 10px;">¡Viaje Terminado!</h2>
        <p style="color: rgba(255,255,255,.6); font-size: 14px;">¿Cómo calificarías a tu conductor?</p>
        <div class="stars" id="starsContainer">
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
        </div>
        <button class="btn btn-primary" style="width: 100%" id="submitRatingBtn">Enviar Calificación</button>
    </div>
</div>
<!-- Overlay de Registro de Pasajero -->
<div id="passengerAuthOverlay" class="rating-overlay" style="display: none; z-index: 9999;">
    <div class="rating-card" style="text-align: left; padding: 25px;">
        <div style="font-size: 40px; margin-bottom: 10px; text-align:center;">👋</div>
        <h2 style="color: #FF6B00; font-weight: 800; margin-bottom: 10px; text-align:center;">¡Bienvenido a MovilCal!</h2>
        <p style="color: rgba(255,255,255,.6); font-size: 13px; text-align:center; margin-bottom: 20px;">Por seguridad, necesitamos conocerte antes de viajar.</p>
        
        <label style="color: #fff; font-size: 12px; font-weight:bold; margin-bottom: 5px; display:block;">Nombre y Apellido *</label>
        <input type="text" id="authNombre" class="route-input" style="width: 100%; box-sizing: border-box; margin-bottom: 15px; padding: 12px; font-size: 14px;" placeholder="Ej. Juan Pérez" maxlength="60" pattern="[A-Za-zà-ü ]{2,60}" autocomplete="name">
        
        <label style="color: #fff; font-size: 12px; font-weight:bold; margin-bottom: 5px; display:block;">Número de Cédula *</label>
        <input type="number" id="authCedula" class="route-input" style="width: 100%; box-sizing: border-box; margin-bottom: 15px; padding: 12px; font-size: 14px;" placeholder="Ej. 1000222333" min="100000" max="9999999999" oninput="if(this.value.length>12) this.value=this.value.slice(0,12)">
        
        <label style="color: #fff; font-size: 12px; font-weight:bold; margin-bottom: 5px; display:block;">Teléfono (Celular) *</label>
        <input type="tel" id="authTelefono" class="route-input" style="width: 100%; box-sizing: border-box; margin-bottom: 25px; padding: 12px; font-size: 14px;" placeholder="Ej. 3110000000" maxlength="10" minlength="10" pattern="[0-9]{10}" inputmode="numeric">

        <button class="btn btn-primary" style="width: 100%; font-size: 16px; padding: 14px;" id="savePassengerAuthBtn">Guardar y Continuar</button>
        <label style="display:flex; align-items:flex-start; margin-top:20px; color:rgba(255,255,255,.4); font-size:11px; line-height:1.4; cursor:pointer;">
            <input type="checkbox" id="authTerms" style="margin-right:10px; margin-top:2px; transform: scale(1.2);">
            <span>Al continuar, aceptas que MovilCal actúa únicamente como intermediario tecnológico para facilitar el contacto con conductores independientes. MovilCal no asume responsabilidad patrimonial ni legal por el servicio prestado.</span>
        </label>
    </div>
</div>

<script type="module" src="/src/user/main.js"></script>
</body>
</html>
