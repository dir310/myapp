<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovilCal | Viajes rápidos y seguros</title>
    <meta name="description" content="Planifica tu ruta con MovilCal en La Calera, Cundinamarca. Mapa satelital interactivo con navegación por Waze.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles/common.css">
    <link rel="stylesheet" href="/src/styles/user.css">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6B00">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MovilCal">
</head>
<body>

<!-- ── Map ── -->
<div id="map"></div>

<!-- ── Top Bar ── -->
<div class="topbar">
    <div class="topbar-brand" id="openSidebarLink">
        <div class="brand-dot">🗺️</div>
        <div>
            <div class="brand-name">Movil<span>Cal</span></div>
            <div class="brand-sub">La Calera, Cundinamarca</div>
        </div>
    </div>
</div>

<!-- ── Route Info Pill ── -->
<div class="route-pill" id="routePill">
    <div class="pill-stat">
        <span>📏</span><span class="pill-val" id="routeDistance">-</span><span class="pill-lbl">km</span>
    </div>
    <div class="pill-sep"></div>
    <div class="pill-stat">
        <span>⏱️</span><span class="pill-val" id="routeTime">-</span><span class="pill-lbl">min</span>
    </div>
</div>

<!-- ── Sidebar ── -->
<div class="sidebar" id="sidebar">
    <div class="sheet-header" id="sidebarHeader" title="Cerrar / Abrir">

        <div class="sheet-title-mini">Menú Principal</div>
    </div>
    
    <div class="sheet-content">
        <!-- Mode Toggle -->
        <div class="mode-toggle">
            <button class="mode-btn active" id="modeSearchBtn">🔍 Buscar lugar</button>
            <button class="mode-btn" id="modeClickBtn">📍 Tocar mapa</button>
        </div>

        <!-- Route Inputs -->
        <div class="route-row">
            <div class="route-dots">
                <div class="dot-a"></div>
                <div class="dot-line"></div>
                <div class="dot-b"></div>
            </div>
            <div class="inputs-col">
                <div class="input-wrapper">
                    <input type="text" id="startInput" class="route-input" placeholder="¿Dónde estás?" autocomplete="off">
                    <button class="clear-btn">✕</button>
                    <div class="suggestions" id="startSuggestions"></div>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="endInput" class="route-input" placeholder="¿A dónde vas?" autocomplete="off">
                    <button class="clear-btn">✕</button>
                    <div class="suggestions" id="endSuggestions"></div>
                </div>
            </div>
        </div>

        <p class="click-hint" id="clickHint">Toca el mapa para colocar inicio y destino</p>

        <!-- Initial Actions -->
        <div id="mainActions" class="actions">
            <button class="btn" style="background:rgba(255,255,255,.05); color:rgba(255,255,255,.3); width:100%" disabled>📍 Selecciona los puntos del viaje</button>
        </div>

        <!-- Price Section (hidden initially) -->
        <div id="priceSection" style="display:none;">
            <div class="price-box">
                <div class="price-title">Tarifa Estimada ($2.000 COP x km)</div>
                <div class="price-value" id="priceValue">$0</div>
            </div>
            <div class="actions">
                <button class="btn" style="background:rgba(255,255,255,.08); color:rgba(255,255,255,.8); flex:0.4;" id="cancelRideBtn">Cancelar</button>
                <button class="btn btn-primary" id="acceptRideBtn">🚗 Pedir Viaje</button>
            </div>
        </div>

        <div class="status-bar" id="statusBar"></div>
    </div>
</div>

<!-- Overlay de Calificación -->
<div id="ratingOverlay" class="rating-overlay">
    <div class="rating-card">
        <div style="font-size: 50px; margin-bottom: 15px;">🏁</div>
        <h2 style="color: #FF6B00; font-weight: 800; margin-bottom: 10px;">¡Viaje Terminado!</h2>
        <p style="color: rgba(255,255,255,.6); font-size: 14px;">¿Cómo calificarías a tu conductor?</p>
        <div class="stars" id="starsContainer">
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
        </div>
        <button class="btn btn-primary" style="width: 100%" id="submitRatingBtn">Enviar Calificación</button>
    </div>
</div>

<script type="module" src="/src/user/main.js"></script>
</body>
</html>
