<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa La Calera | Cundinamarca</title>
    <meta name="description" content="Planifica tu ruta en La Calera, Cundinamarca. Mapa satelital interactivo con navegación por Waze.">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #111;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        /* ── MAP ── */
        #map {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        /* Leaflet overrides */
        .leaflet-routing-container { display: none !important; }
        .leaflet-control-zoom { border: none !important; margin-right: 12px !important; margin-bottom: 200px !important; }
        .leaflet-control-zoom a {
            background: rgba(0,0,0,.72) !important;
            color: #fff !important;
            border: none !important;
            border-radius: 10px !important;
            margin-bottom: 2px !important;
            width: 36px !important; height: 36px !important;
            line-height: 36px !important;
            font-size: 18px !important;
            backdrop-filter: blur(8px);
        }
        .leaflet-control-zoom a:hover { background: rgba(255,107,0,.8) !important; }

        /* ── TOP BAR ── */
        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(180deg, rgba(0,0,0,.85) 0%, transparent 100%);
            pointer-events: none;
        }
        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: all;
        }
        .brand-dot {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, #FF6B00, #FF9500);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(255,107,0,.45);
        }
        .brand-name {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: -.3px;
        }
        .brand-name span { color: #FF6B00; }
        .brand-sub { font-size: 10px; color: rgba(255,255,255,.5); font-weight: 400; }

        /* ── BOTTOM SHEET (Didi style) ── */
        .bottom-sheet {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 999;
            background: #1C1C1E;
            border-radius: 24px 24px 0 0;
            padding: 0 18px 30px;
            box-shadow: 0 -8px 40px rgba(0,0,0,.6);
            transition: transform .35s cubic-bezier(.32,0,.67,0);
        }
        .sheet-handle {
            width: 36px; height: 4px;
            background: rgba(255,255,255,.18);
            border-radius: 2px;
            margin: 12px auto 18px;
        }

        /* Mode toggle */
        .mode-toggle {
            display: flex;
            background: rgba(255,255,255,.07);
            border-radius: 12px;
            padding: 3px; gap: 3px;
            margin-bottom: 16px;
        }
        .mode-btn {
            flex: 1; padding: 8px;
            border: none; border-radius: 10px;
            font-size: 12px; font-family: 'Inter', sans-serif;
            cursor: pointer;
            background: transparent;
            color: rgba(255,255,255,.35);
            font-weight: 600; transition: all .2s;
        }
        .mode-btn.active {
            background: rgba(255,107,0,.18);
            color: #FF6B00;
        }

        /* Route row */
        .route-row {
            display: flex;
            align-items: stretch;
            gap: 10px;
            margin-bottom: 14px;
        }
        .route-dots {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 14px;
            gap: 3px;
        }
        .dot-a {
            width: 10px; height: 10px;
            background: #FF6B00;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,.3);
            flex-shrink: 0;
        }
        .dot-line {
            width: 2px; flex: 1; min-height: 16px;
            background: repeating-linear-gradient(to bottom, rgba(255,255,255,.25) 0, rgba(255,255,255,.25) 4px, transparent 4px, transparent 8px);
        }
        .dot-b {
            width: 10px; height: 10px;
            background: #30D158;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,.3);
            flex-shrink: 0;
        }

        .inputs-col { flex: 1; display: flex; flex-direction: column; gap: 8px; }

        /* Input fields */
        .input-wrapper { position: relative; }
        .route-input {
            width: 100%;
            padding: 11px 34px 11px 13px;
            background: rgba(255,255,255,.08);
            border: 1.5px solid rgba(255,255,255,.08);
            border-radius: 13px;
            color: #fff; font-size: 13px;
            font-family: 'Inter', sans-serif;
            outline: none; transition: all .22s;
        }
        .route-input::placeholder { color: rgba(255,255,255,.3); }
        .route-input:focus {
            border-color: rgba(255,107,0,.5);
            background: rgba(255,107,0,.06);
            box-shadow: 0 0 0 3px rgba(255,107,0,.12);
        }
        .clear-btn {
            position: absolute; right: 10px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: rgba(255,255,255,.25);
            cursor: pointer; font-size: 13px; transition: color .2s;
        }
        .clear-btn:hover { color: rgba(255,255,255,.65); }

        /* Suggestions */
        .suggestions {
            position: absolute;
            bottom: calc(100% + 4px); left: 0; right: 0;
            background: #2C2C2E;
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 13px;
            overflow: hidden;
            z-index: 10000;
            box-shadow: 0 -10px 30px rgba(0,0,0,.5);
            display: none;
        }
        .suggestion-item {
            padding: 10px 13px; font-size: 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,.04);
            color: rgba(255,255,255,.72);
            display: flex; align-items: center; gap: 8px;
            transition: background .18s;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background: rgba(255,107,0,.1); color: #fff; }
        .sugg-icon { color: #FF6B00; font-size: 13px; flex-shrink: 0; }

        .click-hint {
            font-size: 11px; color: rgba(255,255,255,.32);
            text-align: center; padding: 8px 0; display: none;
        }

        /* Action buttons */
        .actions { display: flex; gap: 8px; margin-top: 2px; }
        .btn {
            flex: 1; padding: 13px 10px;
            border: none; border-radius: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 13px; font-weight: 700;
            cursor: pointer; transition: all .22s;
            display: flex; align-items: center; justify-content: center; gap: 7px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #FF6B00, #FF9500);
            color: #fff;
            box-shadow: 0 4px 16px rgba(255,107,0,.35);
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(255,107,0,.45);
        }
        .btn-waze {
            background: rgba(255,255,255,.07);
            color: rgba(255,255,255,.8);
            border: 1.5px solid rgba(255,255,255,.1);
            flex: 0.85;
        }
        .btn-waze:hover:not(:disabled) {
            background: rgba(86,190,229,.15);
            border-color: rgba(86,190,229,.35);
            color: #fff;
        }
        .btn:disabled { opacity: .3; cursor: not-allowed; transform: none !important; }

        /* Waze logo (SVG inline) */
        .waze-icon { width: 16px; height: 16px; }

        /* Status */
        .status-bar {
            margin-top: 11px; padding: 9px 13px;
            background: rgba(255,107,0,.1);
            border: 1px solid rgba(255,107,0,.2);
            border-radius: 10px;
            font-size: 11px; color: rgba(255,160,60,.95);
            display: none; line-height: 1.5;
        }
        .status-bar.error {
            background: rgba(255,69,58,.08);
            border-color: rgba(255,69,58,.2);
            color: rgba(255,100,90,.95);
        }

        /* ── ROUTE INFO pill ── */
        .route-pill {
            position: fixed; top: 72px; left: 50%;
            transform: translateX(-50%);
            z-index: 998;
            background: rgba(0,0,0,.78);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,107,0,.3);
            border-radius: 50px;
            padding: 9px 20px;
            display: none; gap: 16px; align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,.4);
        }
        .pill-stat { display: flex; align-items: center; gap: 5px; }
        .pill-val { font-weight: 800; color: #FF6B00; font-size: 14px; }
        .pill-lbl { color: rgba(255,255,255,.4); font-size: 11px; }
        .pill-sep { width: 1px; height: 18px; background: rgba(255,255,255,.1); }

        /* Spinner */
        .spinner {
            display: inline-block; width: 13px; height: 13px;
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: #fff; border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- ── MAP ── -->
<div id="map"></div>

<!-- ── TOP BAR ── -->
<div class="topbar">
    <div class="topbar-brand">
        <div class="brand-dot">🗺️</div>
        <div>
            <div class="brand-name">La <span>Calera</span></div>
            <div class="brand-sub">Cundinamarca, Colombia</div>
        </div>
    </div>
</div>

<!-- ── ROUTE INFO PILL ── -->
<div class="route-pill" id="routePill">
    <div class="pill-stat">
        <span>📏</span>
        <span class="pill-val" id="routeDistance">-</span>
        <span class="pill-lbl">km</span>
    </div>
    <div class="pill-sep"></div>
    <div class="pill-stat">
        <span>⏱️</span>
        <span class="pill-val" id="routeTime">-</span>
        <span class="pill-lbl">min</span>
    </div>
</div>

<!-- ── BOTTOM SHEET ── -->
<div class="bottom-sheet" id="bottomSheet">
    <div class="sheet-handle"></div>

    <!-- Toggle de modo -->
    <div class="mode-toggle">
        <button class="mode-btn active" id="modeSearchBtn" onclick="setMode('search')">🔍 Buscar lugar</button>
        <button class="mode-btn"        id="modeClickBtn"  onclick="setMode('click')">📍 Tocar mapa</button>
    </div>

    <!-- Inputs con línea de ruta estilo Didi -->
    <div class="route-row">
        <div class="route-dots">
            <div class="dot-a"></div>
            <div class="dot-line"></div>
            <div class="dot-b"></div>
        </div>
        <div class="inputs-col">
            <!-- Inicio -->
            <div class="input-wrapper">
                <input type="text" id="startInput" class="route-input"
                    placeholder="¿Desde dónde?"
                    oninput="onInput(this,'start')" autocomplete="off">
                <button class="clear-btn" onclick="clearPoint('start')">✕</button>
                <div class="suggestions" id="startSuggestions"></div>
            </div>
            <!-- Destino -->
            <div class="input-wrapper">
                <input type="text" id="endInput" class="route-input"
                    placeholder="¿A dónde vas?"
                    oninput="onInput(this,'end')" autocomplete="off">
                <button class="clear-btn" onclick="clearPoint('end')">✕</button>
                <div class="suggestions" id="endSuggestions"></div>
            </div>
        </div>
    </div>

    <p class="click-hint" id="clickHint">Toca el mapa para colocar los puntos de inicio y destino</p>

    <!-- Botones de acción -->
    <div class="actions">
        <button class="btn btn-primary" id="calcBtn" onclick="calculateRoute()" disabled>
            🛣️ Calcular ruta
        </button>
        <button class="btn btn-waze" id="wazeBtn" onclick="openWaze()" disabled>
            <!-- Waze SVG -->
            <svg class="waze-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12c0 5 3.66 9.13 8.44 9.88.02.01.04.01.06.02C10.96 21.96 11.48 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z" fill="#56BEE5"/>
                <circle cx="9" cy="14" r="1.2" fill="#1A1A1A"/>
                <circle cx="15" cy="14" r="1.2" fill="#1A1A1A"/>
                <path d="M9 17c.83.63 1.96 1 3 1s2.17-.37 3-1" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            Waze
        </button>
    </div>

    <div class="status-bar" id="statusBar"></div>
</div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<script>
// ──────────────────────────────────────────
//  MAPA SATELITAL
// ──────────────────────────────────────────
const LA_CALERA = [4.7203, -73.9687];

const map = L.map('map', { zoomControl: false }).setView(LA_CALERA, 13);

// Esri World Imagery (satélite, sin API key)
L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    {
        attribution: 'Tiles © Esri — Source: Esri, USGS, NOAA',
        maxZoom: 19
    }
).addTo(map);

// Etiquetas encima del satélite (nombres de calles/lugares)
L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
    { maxZoom: 19, opacity: 0.85 }
).addTo(map);

L.control.zoom({ position: 'bottomright' }).addTo(map);

// ──────────────────────────────────────────
//  ESTADO
// ──────────────────────────────────────────
let startLatLng = null, endLatLng = null;
let startMarker = null, endMarker = null;
let routingControl = null;
let mode = 'search';
let nextClick = 'start';

// ──────────────────────────────────────────
//  ICONOS ESTILO DIDI
// ──────────────────────────────────────────
function pinIcon(color, label) {
    return L.divIcon({
        className: '',
        html: `<div style="
            width:34px;height:34px;
            background:${color};
            border-radius:50% 50% 50% 0;
            transform:rotate(-45deg);
            border:3px solid white;
            box-shadow:0 4px 14px rgba(0,0,0,.5);
            display:flex;align-items:center;justify-content:center;">
          <span style="transform:rotate(45deg);font-size:13px;font-weight:800;color:#fff;">${label}</span>
        </div>`,
        iconSize: [34, 34], iconAnchor: [17, 34]
    });
}
const iconStart = pinIcon('#FF6B00', 'A');
const iconEnd   = pinIcon('#30D158', 'B');

// ──────────────────────────────────────────
//  MODO
// ──────────────────────────────────────────
function setMode(m) {
    mode = m;
    document.getElementById('modeSearchBtn').classList.toggle('active', m === 'search');
    document.getElementById('modeClickBtn').classList.toggle('active',  m === 'click');

    const inputs = document.querySelectorAll('.route-input, .route-dots');
    const hint   = document.getElementById('clickHint');

    if (m === 'click') {
        document.querySelectorAll('.route-input').forEach(i => i.style.display = 'none');
        document.querySelector('.route-dots').style.display = 'none';
        hint.style.display = 'block';
        nextClick = startLatLng ? 'end' : 'start';
        map.getContainer().style.cursor = 'crosshair';
    } else {
        document.querySelectorAll('.route-input').forEach(i => i.style.display = '');
        document.querySelector('.route-dots').style.display = '';
        hint.style.display = 'none';
        map.getContainer().style.cursor = '';
    }
}

map.on('click', e => {
    if (mode !== 'click') return;
    const { lat, lng } = e.latlng;
    const name = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    if (nextClick === 'start') {
        placeMarker('start', lat, lng, name);
        nextClick = 'end';
        showStatus('📍 Inicio colocado. Ahora toca el destino.', false);
    } else {
        placeMarker('end', lat, lng, name);
        nextClick = 'start';
        showStatus('📍 Destino colocado. Puedes calcular la ruta.', false);
    }
});

// ──────────────────────────────────────────
//  GEOCODIFICACIÓN
// ──────────────────────────────────────────
const timers = {};

function onInput(input, type) {
    const val = input.value.trim();
    clearTimeout(timers[type]);
    const el = document.getElementById(type + 'Suggestions');
    if (val.length < 3) { el.style.display = 'none'; return; }
    timers[type] = setTimeout(() => geocode(val, type), 420);
}

async function geocode(query, type) {
    try {
        const base = 'https://nominatim.openstreetmap.org/search';
        let res  = await fetch(`${base}?q=${encodeURIComponent(query + ' Cundinamarca Colombia')}&format=json&limit=5&countrycodes=co`, { headers: { 'Accept-Language': 'es' } });
        let data = await res.json();
        if (!data.length) {
            res  = await fetch(`${base}?q=${encodeURIComponent(query + ' Colombia')}&format=json&limit=5&countrycodes=co`, { headers: { 'Accept-Language': 'es' } });
            data = await res.json();
        }
        renderSugg(data, type);
    } catch(e) { console.error(e); }
}

function renderSugg(data, type) {
    const el = document.getElementById(type + 'Suggestions');
    if (!data.length) { el.style.display = 'none'; return; }
    el.innerHTML = data.map(d => {
        const name = d.display_name.slice(0,72) + (d.display_name.length > 72 ? '…' : '');
        return `<div class="suggestion-item" onclick="selectSugg('${type}',${d.lat},${d.lon},\`${d.display_name.replace(/`/g,"'").slice(0,70)}\`)">
            <span class="sugg-icon">📍</span>${name}</div>`;
    }).join('');
    el.style.display = 'block';
}

function selectSugg(type, lat, lng, name) {
    document.getElementById(type + 'Input').value = name;
    document.getElementById(type + 'Suggestions').style.display = 'none';
    placeMarker(type, parseFloat(lat), parseFloat(lng), name);
}

document.addEventListener('click', e => {
    if (!e.target.closest('.input-wrapper'))
        document.querySelectorAll('.suggestions').forEach(s => s.style.display = 'none');
});

// ──────────────────────────────────────────
//  MARCADORES
// ──────────────────────────────────────────
function placeMarker(type, lat, lng, name) {
    const ll = L.latLng(lat, lng);
    if (type === 'start') {
        if (startMarker) map.removeLayer(startMarker);
        startLatLng = ll;
        startMarker = L.marker(ll, { icon: iconStart }).addTo(map)
            .bindPopup(`<b>🟠 Inicio</b><br>${name}`);
    } else {
        if (endMarker) map.removeLayer(endMarker);
        endLatLng = ll;
        endMarker = L.marker(ll, { icon: iconEnd }).addTo(map)
            .bindPopup(`<b>🟢 Destino</b><br>${name}`);
    }
    map.panTo(ll);
    updateButtons();
}

function clearPoint(type) {
    if (type === 'start') {
        if (startMarker) { map.removeLayer(startMarker); startMarker = null; }
        startLatLng = null;
        document.getElementById('startInput').value = '';
    } else {
        if (endMarker) { map.removeLayer(endMarker); endMarker = null; }
        endLatLng = null;
        document.getElementById('endInput').value = '';
    }
    if (routingControl) { map.removeControl(routingControl); routingControl = null; }
    document.getElementById('routePill').style.display = 'none';
    updateButtons();
}

function updateButtons() {
    const ok = !!(startLatLng && endLatLng);
    document.getElementById('calcBtn').disabled = !ok;
    document.getElementById('wazeBtn').disabled = !ok;
}

// ──────────────────────────────────────────
//  CÁLCULO DE RUTA
// ──────────────────────────────────────────
function calculateRoute() {
    if (!startLatLng || !endLatLng) return;
    if (routingControl) { map.removeControl(routingControl); routingControl = null; }

    const btn = document.getElementById('calcBtn');
    btn.innerHTML = '<span class="spinner"></span>&nbsp;Calculando…';
    btn.disabled = true;

    routingControl = L.Routing.control({
        waypoints: [startLatLng, endLatLng],
        routeWhileDragging: false,
        showAlternatives: false,
        lineOptions: {
            styles: [
                { color: '#FF6B00', weight: 7, opacity: .15 },
                { color: '#FF7A1A', weight: 4, opacity: 1 }
            ]
        },
        createMarker: () => null,
        router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' })
    }).addTo(map);

    routingControl.on('routesfound', e => {
        const r    = e.routes[0];
        const dist = (r.summary.totalDistance / 1000).toFixed(1);
        const mins = Math.round(r.summary.totalTime / 60);

        document.getElementById('routeDistance').textContent = dist;
        document.getElementById('routeTime').textContent     = mins;
        document.getElementById('routePill').style.display   = 'flex';

        map.fitBounds(L.latLngBounds([startLatLng, endLatLng]).pad(0.15));
        showStatus(`✅ ${dist} km · ~${mins} min`, false);
        btn.innerHTML = '🛣️ Calcular ruta';
        btn.disabled  = false;
    });

    routingControl.on('routingerror', () => {
        showStatus('❌ No se pudo calcular la ruta. Intenta con otros puntos.', true);
        btn.innerHTML = '🛣️ Calcular ruta';
        btn.disabled  = false;
    });
}

// ──────────────────────────────────────────
//  WAZE
// ──────────────────────────────────────────
function openWaze() {
    if (!startLatLng || !endLatLng) return;
    const url = `https://waze.com/ul?from=ll.${startLatLng.lat},${startLatLng.lng}&to=ll.${endLatLng.lat},${endLatLng.lng}&navigate=yes`;
    window.open(url, '_blank');
}

// ──────────────────────────────────────────
//  UTILS
// ──────────────────────────────────────────
function showStatus(msg, isError) {
    const el = document.getElementById('statusBar');
    el.textContent = msg;
    el.className = 'status-bar' + (isError ? ' error' : '');
    el.style.display = 'block';
}
</script>
</body>
</html>
