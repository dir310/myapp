<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa La Calera | Cundinamarca</title>
    <meta name="description" content="Planifica tu ruta en La Calera, Cundinamarca. Mapa satelital interactivo con navegación por Waze.">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: #111; color: #fff; height: 100vh; overflow: hidden; }
        #map { position: fixed; inset: 0; z-index: 1; }
        .leaflet-routing-container { display: none !important; }
        .leaflet-control-zoom { border: none !important; margin-right: 12px !important; margin-bottom: 270px !important; transition: margin-bottom .4s; }
        .leaflet-control-zoom a { background: rgba(0,0,0,.72) !important; color: #fff !important; border: none !important; border-radius: 10px !important; margin-bottom: 2px !important; width: 36px !important; height: 36px !important; line-height: 36px !important; font-size: 18px !important; backdrop-filter: blur(8px); }
        .leaflet-control-zoom a:hover { background: rgba(255,107,0,.8) !important; }

        .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; background: linear-gradient(180deg, rgba(0,0,0,.85) 0%, transparent 100%); pointer-events: none; }
        .topbar-brand { display: flex; align-items: center; gap: 10px; pointer-events: all; }
        .brand-dot { width: 38px; height: 38px; background: linear-gradient(135deg, #FF6B00, #FF9500); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 4px 15px rgba(255,107,0,.45); }
        .brand-name { font-size: 16px; font-weight: 800; letter-spacing: -.3px; }
        .brand-name span { color: #FF6B00; }
        .brand-sub { font-size: 10px; color: rgba(255,255,255,.5); font-weight: 400; }

        .bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 999; background: #1C1C1E; border-radius: 24px 24px 0 0; box-shadow: 0 -8px 40px rgba(0,0,0,.6); transition: transform .4s cubic-bezier(.32,0,.67,0); }
        .bottom-sheet.minimized { transform: translateY(calc(100% - 46px)); }
        .sheet-header { padding: 16px 0; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; }
        .sheet-handle { width: 44px; height: 5px; background: rgba(255,255,255,.25); border-radius: 3px; transition: background .2s; }
        .sheet-header:hover .sheet-handle { background: rgba(255,107,0,.8); }
        .sheet-title-mini { position: absolute; right: 18px; font-size: 12px; font-weight: 600; color: #FF6B00; opacity: 0; transition: opacity .3s; pointer-events: none; }
        .bottom-sheet.minimized .sheet-title-mini { opacity: 1; }

        .sheet-content { padding: 0 18px 24px; opacity: 1; transition: opacity .3s .1s; }
        .bottom-sheet.minimized .sheet-content { opacity: 0; pointer-events: none; transition: opacity .1s; }

        .mode-toggle { display: flex; background: rgba(255,255,255,.07); border-radius: 12px; padding: 3px; gap: 3px; margin-bottom: 12px; }
        .mode-btn { flex: 1; padding: 7px; border: none; border-radius: 10px; font-size: 12px; font-family: 'Inter', sans-serif; cursor: pointer; background: transparent; color: rgba(255,255,255,.35); font-weight: 600; transition: all .2s; }
        .mode-btn.active { background: rgba(255,107,0,.18); color: #FF6B00; }

        .route-row { display: flex; align-items: stretch; gap: 10px; margin-bottom: 12px; }
        .route-dots { display: flex; flex-direction: column; align-items: center; padding-top: 14px; gap: 3px; }
        .dot-a { width: 10px; height: 10px; background: #FF6B00; border-radius: 50%; border: 2px solid rgba(255,255,255,.3); flex-shrink: 0; }
        .dot-line { width: 2px; flex: 1; min-height: 14px; background: repeating-linear-gradient(to bottom, rgba(255,255,255,.25) 0, rgba(255,255,255,.25) 4px, transparent 4px, transparent 8px); }
        .dot-b { width: 10px; height: 10px; background: #30D158; border-radius: 50%; border: 2px solid rgba(255,255,255,.3); flex-shrink: 0; }
        .inputs-col { flex: 1; display: flex; flex-direction: column; gap: 6px; }

        .input-wrapper { position: relative; }
        .route-input { width: 100%; padding: 10px 32px 10px 13px; background: rgba(255,255,255,.08); border: 1.5px solid rgba(255,255,255,.08); border-radius: 12px; color: #fff; font-size: 13px; font-family: 'Inter', sans-serif; outline: none; transition: all .22s; }
        .route-input::placeholder { color: rgba(255,255,255,.3); }
        .route-input:focus { border-color: rgba(255,107,0,.5); background: rgba(255,107,0,.06); box-shadow: 0 0 0 3px rgba(255,107,0,.12); }
        .clear-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(255,255,255,.25); cursor: pointer; font-size: 13px; transition: color .2s; }
        .clear-btn:hover { color: rgba(255,255,255,.65); }

        .suggestions { position: absolute; bottom: calc(100% + 4px); left: 0; right: 0; background: #2C2C2E; border: 1px solid rgba(255,255,255,.08); border-radius: 13px; overflow: hidden; z-index: 10000; box-shadow: 0 -10px 30px rgba(0,0,0,.5); display: none; }
        .suggestion-item { padding: 10px 13px; font-size: 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,.04); color: rgba(255,255,255,.72); display: flex; align-items: center; gap: 8px; transition: background .18s; }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background: rgba(255,107,0,.1); color: #fff; }
        .sugg-icon { color: #FF6B00; font-size: 13px; flex-shrink: 0; }
        
        .curr-loc { color: #30D158; font-weight: 500; }
        .curr-loc:hover { background: rgba(48,209,88,.15); }

        .click-hint { font-size: 11px; color: rgba(255,255,255,.32); text-align: center; padding: 6px 0; display: none; }

        .actions { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 13px 10px; border: none; border-radius: 13px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all .22s; display: flex; align-items: center; justify-content: center; gap: 7px; }
        .btn-primary { background: linear-gradient(135deg, #FF6B00, #FF9500); color: #fff; box-shadow: 0 4px 16px rgba(255,107,0,.35); }
        .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,107,0,.45); }
        .btn:disabled { opacity: .3; cursor: not-allowed; transform: none !important; }

        .price-box { background: rgba(48,209,88,.08); border: 1px solid rgba(48,209,88,.2); border-radius: 14px; padding: 14px; text-align: center; margin-bottom: 12px; }
        .price-title { font-size: 11px; color: rgba(255,255,255,.5); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .price-value { font-size: 28px; font-weight: 800; color: #30D158; }

        .status-bar { margin-top: 10px; padding: 8px 12px; background: rgba(255,107,0,.1); border: 1px solid rgba(255,107,0,.2); border-radius: 10px; font-size: 11px; color: rgba(255,160,60,.95); display: none; line-height: 1.4; text-align:center; }
        .status-bar.error { background: rgba(255,69,58,.08); border-color: rgba(255,69,58,.2); color: rgba(255,100,90,.95); }

        .route-pill { position: fixed; top: 72px; left: 50%; transform: translateX(-50%); z-index: 998; background: rgba(0,0,0,.85); backdrop-filter: blur(14px); border: 1px solid rgba(255,107,0,.3); border-radius: 50px; padding: 9px 20px; display: none; gap: 16px; align-items: center; box-shadow: 0 8px 25px rgba(0,0,0,.5); }
        .pill-stat { display: flex; align-items: center; gap: 6px; }
        .pill-val { font-weight: 800; color: #FF6B00; font-size: 14px; }
        .pill-lbl { color: rgba(255,255,255,.4); font-size: 11px; }
        .pill-sep { width: 1px; height: 18px; background: rgba(255,255,255,.15); }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 3px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="map"></div>
<div class="topbar"><div class="topbar-brand"><div class="brand-dot">🗺️</div><div><div class="brand-name">La <span>Calera</span></div><div class="brand-sub">Cundinamarca, Colombia</div></div></div></div>
<div class="route-pill" id="routePill"><div class="pill-stat"><span>📏</span><span class="pill-val" id="routeDistance">-</span><span class="pill-lbl">km</span></div><div class="pill-sep"></div><div class="pill-stat"><span>⏱️</span><span class="pill-val" id="routeTime">-</span><span class="pill-lbl">min</span></div></div>

<div class="bottom-sheet" id="bottomSheet">
    <div class="sheet-header" onclick="toggleSheet()" title="Minimizar / Maximizar"><div class="sheet-handle"></div><div class="sheet-title-mini">Abrir menú 🔼</div></div>
    <div class="sheet-content">
        <div class="mode-toggle"><button class="mode-btn active" id="modeSearchBtn" onclick="setMode('search')">🔍 Buscar lugar</button><button class="mode-btn" id="modeClickBtn" onclick="setMode('click')">📍 Tocar mapa</button></div>
        <div class="route-row">
            <div class="route-dots"><div class="dot-a"></div><div class="dot-line"></div><div class="dot-b"></div></div>
            <div class="inputs-col">
                <div class="input-wrapper">
                    <input type="text" id="startInput" class="route-input" placeholder="¿Dónde estás?" onfocus="showLocationSugg()" oninput="onInput(this,'start')" autocomplete="off">
                    <button class="clear-btn" onclick="clearPoint('start')">✕</button>
                    <div class="suggestions" id="startSuggestions"></div>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="endInput" class="route-input" placeholder="¿A dónde vas?" oninput="onInput(this,'end')" autocomplete="off">
                    <button class="clear-btn" onclick="clearPoint('end')">✕</button>
                    <div class="suggestions" id="endSuggestions"></div>
                </div>
            </div>
        </div>
        <p class="click-hint" id="clickHint">Toca el mapa para colocar inicio y destino</p>

        <!-- Bloque Inicial (Pidiendo puntos) -->
        <div id="mainActions" class="actions">
            <button class="btn" style="background:rgba(255,255,255,.05); color:rgba(255,255,255,.3); width:100%" disabled>📍 Selecciona los puntos del viaje</button>
        </div>

        <!-- Bloque Tarifa (Aparece cuando hay ruta) -->
        <div id="priceSection" style="display:none;">
            <div class="price-box">
                <div class="price-title">Tarifa Estimada ($2.000 COP x km)</div>
                <div class="price-value" id="priceValue">$0</div>
            </div>
            <div class="actions">
                <button class="btn" style="background:rgba(255,255,255,.08); color:rgba(255,255,255,.8); flex:0.4;" onclick="cancelRide()">Cancelar</button>
                <button class="btn btn-primary" onclick="acceptRide()" id="acceptRideBtn">
                    🚗 Pedir Viaje
                </button>
            </div>
        </div>

        <div class="status-bar" id="statusBar"></div>
    </div>
</div>

<!-- Scripts de Mapa -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<!-- Scripts de Supabase -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
// ---------- SUPABASE INTEGRACIÓN ----------
const supabaseUrl = 'https://rgdrgbfkoczjeddgbuxq.supabase.co';
const supabaseKey = 'sb_publishable_k-68jStH-ZieKHp5TdPFhg_Kx2FleQm';
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

// VARIABLES
let sheetMinimized = false;
let startLatLng = null, endLatLng = null, startMarker = null, endMarker = null, routingControl = null;
let mode = 'search', nextClick = 'start';
let currentRideId = null;

// UI
function toggleSheet() {
    const sheet = document.getElementById('bottomSheet'); sheetMinimized = !sheetMinimized;
    if(sheetMinimized) { sheet.classList.add('minimized'); document.querySelector('.leaflet-control-zoom').style.marginBottom = '60px'; }
    else { sheet.classList.remove('minimized'); document.querySelector('.leaflet-control-zoom').style.marginBottom = '270px'; }
}

// MAPA NATIVO
const LA_CALERA = [4.7203, -73.9687];
const map = L.map('map', { zoomControl: false }).setView(LA_CALERA, 13);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri', maxZoom: 19 }).addTo(map);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19, opacity: 0.85 }).addTo(map);
L.control.zoom({ position: 'bottomright' }).addTo(map);

function pinIcon(color, label) {
    return L.divIcon({ className: '', html: `<div style="width:34px;height:34px;background:${color};border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid white;box-shadow:0 4px 14px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;"><span style="transform:rotate(45deg);font-size:13px;font-weight:800;color:#fff;">${label}</span></div>`, iconSize: [34, 34], iconAnchor: [17, 34] });
}
const iconStart = pinIcon('#FF6B00', 'A'), iconEnd = pinIcon('#30D158', 'B');

function setMode(m) {
    mode = m; document.getElementById('modeSearchBtn').classList.toggle('active', m === 'search'); document.getElementById('modeClickBtn').classList.toggle('active',  m === 'click');
    const hint = document.getElementById('clickHint');
    if (m === 'click') {
        document.querySelectorAll('.route-input').forEach(i => i.style.display = 'none'); document.querySelector('.route-dots').style.display = 'none'; hint.style.display = 'block'; nextClick = startLatLng ? 'end' : 'start'; map.getContainer().style.cursor = 'crosshair';
        if(sheetMinimized) toggleSheet();
    } else {
        document.querySelectorAll('.route-input').forEach(i => i.style.display = ''); document.querySelector('.route-dots').style.display = ''; hint.style.display = 'none'; map.getContainer().style.cursor = '';
    }
}

map.on('click', e => {
    if (mode !== 'click') { if(!sheetMinimized) toggleSheet(); return; }
    const { lat, lng } = e.latlng; const name = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    if (nextClick === 'start') { placeMarker('start', lat, lng, name); nextClick = 'end'; showStatus('📍 Inicio colocado.', false); }
    else { placeMarker('end', lat, lng, name); nextClick = 'start'; showStatus('📍 Destino colocado. Calculando...', false); }
});

function showLocationSugg() {
    if(document.getElementById('startInput').value.trim() === '') {
        const sugg = document.getElementById('startSuggestions');
        sugg.innerHTML = `<div class="suggestion-item curr-loc" onclick="useCurrentLocation()"><span class="sugg-icon">🎯</span> Usar mi ubicación actual</div>`;
        sugg.style.display = 'block';
    }
}

function useCurrentLocation() {
    document.getElementById('startSuggestions').style.display = 'none';
    if (!navigator.geolocation) {
        showStatus('❌ Tu navegador no soporta ubicación.', true); return;
    }
    document.getElementById('startInput').value = 'Buscando GPS...';
    
    navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude; const lon = pos.coords.longitude;
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
        .then(r => r.json()).then(data => {
            let name = "Mi ubicación actual";
            if(data.address && (data.address.road || data.address.neighbourhood)) { name = (data.address.road || "") + " " + (data.address.neighbourhood || ""); }
            document.getElementById('startInput').value = name; placeMarker('start', lat, lon, name);
        }).catch(() => {
            document.getElementById('startInput').value = "Mi ubicación actual"; placeMarker('start', lat, lon, "Mi ubicación actual");
        });
    }, err => { showStatus('❌ Activa el GPS y permisos.', true); document.getElementById('startInput').value = ''; }, { enableHighAccuracy: true });
}

document.addEventListener('click', e => {
    if (!e.target.closest('.input-wrapper')) document.querySelectorAll('.suggestions').forEach(s => s.style.display = 'none');
});

const timers = {};
function onInput(input, type) { 
    const val = input.value.trim(); clearTimeout(timers[type]); 
    const el = document.getElementById(type + 'Suggestions'); 
    if (val.length < 3) { 
        if(type === 'start' && val.length === 0) showLocationSugg(); else el.style.display = 'none'; return; 
    } 
    timers[type] = setTimeout(() => geocode(val, type), 420); 
}
async function geocode(q, type) {
    try { let res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q + ' Cundinamarca Colombia')}&format=json&limit=5&countrycodes=co`); let data = await res.json();
    if(!data.length){ res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q + ' Colombia')}&format=json&limit=5&countrycodes=co`); data = await res.json(); } renderSugg(data, type); } catch(e) {}
}
function renderSugg(data, type) { 
    const el = document.getElementById(type + 'Suggestions'); 
    if (!data.length) { if(type === 'start' && document.getElementById('startInput').value === '') showLocationSugg(); else el.style.display = 'none'; return; } 
    let html = ''; if(type === 'start') { html += `<div class="suggestion-item curr-loc" onclick="useCurrentLocation()"><span class="sugg-icon">🎯</span> Usar mi ubicación actual</div>`; }
    html += data.map(d => `<div class="suggestion-item" onclick="selectSugg('${type}',${d.lat},${d.lon},\`${d.display_name.replace(/`/g,"'").slice(0,70)}\`)"><span class="sugg-icon">📍</span>${d.display_name.slice(0,72)}</div>`).join(''); 
    el.innerHTML = html; el.style.display = 'block'; 
}
function selectSugg(type, lat, lng, name) { document.getElementById(type + 'Input').value = name; document.getElementById(type + 'Suggestions').style.display = 'none'; placeMarker(type, parseFloat(lat), parseFloat(lng), name); }

function placeMarker(type, lat, lng, name) {
    const ll = L.latLng(lat, lng);
    if (type === 'start') { if (startMarker) map.removeLayer(startMarker); startLatLng = ll; startMarker = L.marker(ll, { icon: iconStart }).addTo(map).bindPopup(`<b>🟠 Inicio</b><br>${name}`); }
    else { if (endMarker) map.removeLayer(endMarker); endLatLng = ll; endMarker = L.marker(ll, { icon: iconEnd }).addTo(map).bindPopup(`<b>🟢 Destino</b><br>${name}`); }
    map.panTo(ll); checkRoute();
}

function clearPoint(t) {
    if (t === 'start') { if (startMarker) { map.removeLayer(startMarker); startMarker = null; } startLatLng = null; document.getElementById('startInput').value = ''; }
    else { if (endMarker) { map.removeLayer(endMarker); endMarker = null; } endLatLng = null; document.getElementById('endInput').value = ''; }
    if (routingControl) { map.removeControl(routingControl); routingControl = null; document.getElementById('routePill').style.display = 'none'; }
    document.getElementById('mainActions').style.display = 'flex'; document.getElementById('priceSection').style.display = 'none';
    document.getElementById('mainActions').innerHTML = '<button class="btn" style="background:rgba(255,255,255,.05); color:rgba(255,255,255,.3); width:100%" disabled>📍 Selecciona los puntos del viaje</button>';
    showStatus('', false);
}

function checkRoute() {
    const ok = !!(startLatLng && endLatLng);
    if(ok) {
        if (routingControl) { map.removeControl(routingControl); routingControl = null; }
        document.getElementById('mainActions').innerHTML = '<button class="btn" style="background:rgba(255,107,0,.15); color:#FF6B00; border:1px solid rgba(255,107,0,.3); width:100%" disabled><span class="spinner" style="border-top-color:#FF6B00; width:14px; height:14px;"></span>&nbsp; Calculando tarifa...</button>';
        
        routingControl = L.Routing.control({ waypoints: [startLatLng, endLatLng], routeWhileDragging: false, showAlternatives: false, lineOptions: { styles: [{ color: '#FF6B00', weight: 8, opacity: .35 }, { color: '#FF7A1A', weight: 4, opacity: 1 }] }, createMarker: () => null, router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }) }).addTo(map);
        
        routingControl.on('routesfound', e => { 
            const r = e.routes[0], dist = (r.summary.totalDistance / 1000).toFixed(1), mins = Math.round(r.summary.totalTime / 60); 
            document.getElementById('routeDistance').textContent = dist; document.getElementById('routeTime').textContent = mins; document.getElementById('routePill').style.display = 'flex'; 
            map.fitBounds(L.latLngBounds([startLatLng, endLatLng]).pad(0.15)); 
            
            const precio = Math.max(1, Math.round(parseFloat(dist) * 2000));
            document.getElementById('priceValue').textContent = '$' + precio.toLocaleString('es-CO');
            
            document.getElementById('mainActions').style.display = 'none'; document.getElementById('priceSection').style.display = 'block';
            showStatus('', false); document.getElementById('statusBar').style.display = 'none';
            if(sheetMinimized) toggleSheet();
        });
        routingControl.on('routingerror', () => { 
            showStatus('❌ Error al calcular ruta.', true); 
            document.getElementById('mainActions').innerHTML = '<button class="btn" style="background:rgba(255,255,255,.05); color:rgba(255,255,255,.3); width:100%" disabled>📍 Selecciona los puntos del viaje</button>';
        });
    }
}

function cancelRide() { clearPoint('start'); clearPoint('end'); currentRideId = null; }

// --- FUNCIONALIDAD SUPABASE: PIDIENDO EL VIAJE ---
async function acceptRide() { 
    if (!startLatLng || !endLatLng) return; 

    const originName = document.getElementById('startInput').value || 'Punto de Inicio';
    const destName = document.getElementById('endInput').value || 'Destino';
    const priceStr = document.getElementById('priceValue').textContent.replace(/[^0-9]/g, '');
    const price = parseInt(priceStr, 10);
    const distText = document.getElementById('routeDistance').textContent + ' km';

    const btn = document.getElementById('acceptRideBtn');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<span class="spinner" style="border-width:2px; height:14px; width:14px; margin-right:6px"></span> Pidiendo viaje...';
    btn.disabled = true;

    try {
        const { data, error } = await supabaseClient.from('viajes').insert([
            { 
                origen_nombre: originName,
                origen_lat: startLatLng.lat,
                origen_lng: startLatLng.lng,
                destino_nombre: destName,
                destino_lat: endLatLng.lat,
                destino_lng: endLatLng.lng,
                tarifa: price,
                distancia_km: distText,
                estado: 'buscando'
            }
        ]).select();

        if (error) throw error;
        
        currentRideId = data[0].id;
        
        // Ventana de Cargando
        document.getElementById('priceSection').innerHTML = `
            <div style="text-align:center; padding: 25px 0;">
                <div class="spinner" style="border-color: rgba(255,107,0,.2); border-top-color: #FF6B00; width: 45px; height: 45px; border-width: 5px; margin-bottom: 25px;"></div>
                <h3 style="color:#FF6B00; margin-bottom:12px; font-weight:800; font-size:20px;">Buscando conductor...</h3>
                <p style="color:rgba(255,255,255,.6); font-size:13px; line-height:1.5;">Estamos enviando tu solicitud a todos los conductores disponibles en La Calera.</p>
                <div style="margin-top:20px; color:#30D158; font-weight:bold; font-size:24px;">$${price.toLocaleString('es-CO')}</div>
            </div>
            <button class="btn" style="background:rgba(255,255,255,.08); color:rgba(255,255,255,.8); width:100%; margin-top:10px" onclick="cancelRide()">Cancelar Solicitud</button>
        `;

        // 📡 ACTIVAR RADAR: escuchar cuando el estado cambie a "aceptado"
        listenForDriver(currentRideId);

    } catch (err) {
        showStatus('❌ Hubo un error de conexión con la Nube.', true);
        btn.innerHTML = originalText;
        btn.disabled = false;
        console.error(err);
    }
}

function listenForDriver(rideId) {
    // Si la tabla cambia, supabase nos avisa en tiempo real
    supabaseClient.channel('custom-all-channel')
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'viajes', filter: `id=eq.${rideId}` }, payload => {
          if(payload.new.estado === 'aceptado') {
              // Pantalla de triunfo!
              document.getElementById('priceSection').innerHTML = `
                  <div style="text-align:center; padding: 15px 0;">
                      <div style="font-size:45px; margin-bottom: 12px; animation:bounce 2s infinite;">🚕</div>
                      <h3 style="color:#30D158; margin-bottom:10px; font-weight:800;">¡Conductor en camino!</h3>
                      <p style="color:rgba(255,255,255,.8); font-size:13px; background:rgba(48,209,88,.15); padding:10px; border-radius:10px;">Espera pacientemente en tu punto de inicio. Ya te avisamos por dónde vamos.</p>
                  </div>
              `;
          }
      }).subscribe();
}

function showStatus(msg, err) { const el = document.getElementById('statusBar'); if(!msg){el.style.display='none';return;} el.textContent = msg; el.className = 'status-bar' + (err ? ' error' : ''); el.style.display = 'block'; }
</script>
</body>
</html>
